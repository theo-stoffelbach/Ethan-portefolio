# =============================================================================
# 🎨 ETHAN-PORTFOLIO - PRODUCTION (GHCR + WATCHTOWER)
# =============================================================================
# Utilise l'image pré-buildée depuis GHCR
# Watchtower met à jour automatiquement le container
# =============================================================================

services:
  ethan-portfolio:
    image: ghcr.io/theo-stoffelbach/ethan-portefolio:latest
    container_name: ethan_portfolio
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - npm-public
      - webnet
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  npm-public:
    external: true
  webnet:
    external: true
