services:
  ethan-portfolio:
    build: .
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    environment:
      - NODE_ENV=production
    networks:
      - npm-public
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  npm-public:
    external: true
